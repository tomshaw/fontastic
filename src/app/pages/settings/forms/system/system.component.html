<div class="tabs-panel tabs-panel-open">
  <div class="panel-content">
    <div class="row">
      <div class="col-md-12">
        <div class="block">
  
          <div class="block__head">
            <div class="block__head-title">
              <h1>System Settings</h1>
            </div>
          </div>
  
          <div class="block__body">
            <table class="table table-settings">
              <thead class="thead-dark">
                <tr>
                  <th class="values">Key</th>
                  <th class="values">Value</th>
                </tr>
              </thead>
              <tbody>
                <ng-container *ngFor="let item of systemSettings; let i = index;">
                  <tr>
                    <td class="values">{{item.key}}</td>
                    <td class="values">{{item.value}}</td>
                  </tr>
                </ng-container>
              </tbody>
            </table>
          </div>
  
        </div>
      </div>
    </div>
  </div>
</div>
