<div class="tabs-panel tabs-panel-open">
  <div class="panel-content">
    <div class="row">
      <div class="col-md-12">
        <div class="block">
  
          <div class="block__head">
            <div class="block__head-title">
              <h1>Latest News Settings</h1>
            </div>
          </div>
  
          <form class="form" #newsApiForm="ngForm" (ngSubmit)="onSubmit(newsApiForm)">
            <div class="block__body">
              <div class="form-group">
                <label for="apiKey">Api Key</label>
                <input type="text" class="form-control" name="apiKey" id="apiKey" [(ngModel)]="apiKey" #selectedApiKey="ngModel">
                <span class="form-text text-muted">Please visit <a href="https://newsapi.org">newsapi.org</a> to obtain your free key.</span>
              </div>
            </div>
            <div class="block__foot">
              <div class="form__actions">
                <app-button [type]="'submit'" [title]="'Submit'" [ngClass]="'app-button__md app-button__rounded'" [attr.disabled]="!newsApiForm.form.valid">Submit</app-button>
                <app-button [type]="'reset'" [title]="'Reset'" [ngClass]="'app-button__md app-button__rounded app-button__success'" (click)="newsApiForm.reset();">Reset</app-button>
              </div>
            </div>
          </form>
  
        </div>
      </div>
    </div>
  </div>
</div>
