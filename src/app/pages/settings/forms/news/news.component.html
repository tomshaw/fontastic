<div class="tabs-panel tabs-panel-open">
  <div class="panel-content">
    <div class="container mx-auto p-7">

      <div class="flex flex-col grow bg-white shadow rounded-md">

        <!-- Head -->
        <div class="flex items-center justify-between relative py-0 px-5 min-h-[60px] border-b border-[#eaeaea];">
          <div class="text-left">
            <h1 class="text-lg font-semibold tracking-wide">Database Management</h1>
          </div>
        </div>

        <form class="form" #newsApiForm="ngForm" (ngSubmit)="onSubmit(newsApiForm)">

          <!-- Body -->
          <div class="flex flex-col py-10 px-5">
            <div class="form-group">
              <label for="apiKey">Api Key</label>
              <input type="text" class="form-control" name="apiKey" id="apiKey" [(ngModel)]="apiKey"
                #selectedApiKey="ngModel">
              <span class="form-text text-muted">Please visit <a href="https://newsapi.org">newsapi.org</a> to obtain
                your free key.</span>
            </div>
          </div>

          <!-- Footer -->
          <div class="flex items-center py-5 px-5 border-t border-[#eaeaea]">
            <app-button [type]="'submit'" [title]="'Submit'" [ngClass]="'app-button__md app-button__rounded'"
              [attr.disabled]="!newsApiForm.form.valid">Submit</app-button>
            <app-button [type]="'reset'" [title]="'Reset'"
              [ngClass]="'app-button__md app-button__rounded app-button__success'" (click)="newsApiForm.reset();">Reset
            </app-button>
          </div>

        </form>

      </div>

    </div>
  </div>
</div>
