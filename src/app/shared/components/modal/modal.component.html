<div id="modal" class="modal-settings"><!-- active -->
  <div class="modal-settings__window">
    <form #userlogin="ngForm" (ngSubmit)="onClickSubmit(userlogin.value)" style="width: 100%;">
      <header>
        <h1>{{ modalTitle }}</h1>
        <button type="button" class="btn-theme material-icons close" title="Close">close</button>
      </header>
      <article>
        <div class="mb-3">
          <label for="exampleFormControlInput1">Email address</label>
          <input type="email" class="form-control" name="email" id="exampleFormControlInput1" value="" placeholder="name@example.com" ngModel>
        </div>
        <div class="mb-3">
          <label for="exampleFormControlSelect1">Example select</label>
          <select class="form-control" name="options" id="exampleFormControlSelect1" ngModel>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="exampleFormControlSelect2">Example multiple select</label>
          <select multiple class="form-control" name="multi" id="exampleFormControlSelect2" ngModel>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="exampleFormControlTextarea1">Example textarea</label>
          <textarea class="form-control" id="exampleFormControlTextarea1" name="message" rows="3" ngModel></textarea>
        </div>
      </article>
      <footer>
        <button type="submit" class="btn-theme app-button">Submit</button>
      </footer>
    </form>
  </div>
</div>
